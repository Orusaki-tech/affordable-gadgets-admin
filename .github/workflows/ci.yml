name: CI / CD

on:
  pull_request:
    branches: [main, master]
  push:
    branches: [main, master]

env:
  REGION: us-east1
  REPOSITORY: ag-admin

jobs:
  build:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: inventory-management-frontend
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: inventory-management-frontend/package-lock.json

      - name: Build
        env:
          REACT_APP_API_BASE_URL: https://api.affordable-gadgetske.com/api/inventory
        run: |
          npm ci
          npm run build

      - name: Docker build
        run: docker build -t ag-admin:ci .

  push-and-deploy:
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
    steps:
      - uses: actions/checkout@v4

      - uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ secrets.GCP_WIF_PROVIDER }}
          service_account: ${{ secrets.GCP_DEPLOY_SA }}

      - run: gcloud auth configure-docker ${{ env.REGION }}-docker.pkg.dev --quiet

      - name: Build and push to Artifact Registry
        env:
          PROJECT_ID: ${{ secrets.GCP_PROJECT_ID }}
          REACT_APP_API_BASE_URL: https://api.affordable-gadgetske.com/api/inventory
        working-directory: inventory-management-frontend
        run: |
          IMAGE="${{ env.REGION }}-docker.pkg.dev/${PROJECT_ID}/${{ env.REPOSITORY }}/ag-admin"
          docker build \
            --build-arg REACT_APP_API_BASE_URL="${REACT_APP_API_BASE_URL}" \
            -t "${IMAGE}:${{ github.sha }}" -t "${IMAGE}:production-latest" .
          docker push "${IMAGE}:${{ github.sha }}"
          docker push "${IMAGE}:production-latest"

      - name: Rolling update production admin MIG
        env:
          MIG_NAME: ${{ secrets.PRODUCTION_ADMIN_MIG_NAME }}
          PROJECT_ID: ${{ secrets.GCP_PROJECT_ID }}
        run: |
          gcloud compute instance-groups managed rolling-action replace "${MIG_NAME}" \
            --region=${{ env.REGION }} --project="${PROJECT_ID}" --max-unavailable=0 --max-surge=1
